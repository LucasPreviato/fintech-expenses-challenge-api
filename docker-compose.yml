services:
  postgres:
    image: postgres:16-alpine
    container_name: fintech-expenses-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintech}
      POSTGRES_DB: ${POSTGRES_DB:-fintech_expenses}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-fintech} -d ${POSTGRES_DB:-fintech_expenses}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
